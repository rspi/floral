<html lang="en">
  <head>
    <link rel="icon" href="data:;base64,=" />
    <script type="module" src="./components/index.js"></script>
    <link rel="stylesheet" href="variables.css" />
    <style>
      body {
        background: var(--ds-color-background);
        color: var(--ds-color-text);
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
      }
    </style>
  </head>
  <body>
    <!-- Cleaned up for manual testing -->
    <div style="padding: 40px; display: flex; flex-direction: column; gap: 40px;">
      <div>
        <ds-button id="btn-primary" variant="primary">Primary Button</ds-button>
        <ds-tooltip anchor="btn-primary" position="top">
          This is a primary action
        </ds-tooltip>
      </div>

      <div>
        <ds-button id="btn-negative" variant="negative">Negative Button</ds-button>
        <ds-tooltip anchor="btn-negative" position="right" delay="0">
          This will delete stuff!
        </ds-tooltip>
      </div>
    </div>

    <ds-button>default</ds-button>
    <ds-button disabled>disabled</ds-button>

    <form>
      <fieldset>
        <legend>Fieldset</legend>
        <ds-button name="submit">submit</ds-button>
      </fieldset>
    </form>
  </body>
</html>
